name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for git history checks

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Install cargo-nextest
        run: cargo install cargo-nextest --locked

      - name: Run tdd-ratchet
        run: cargo run --

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: [check]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: cargo-ratchet
            asset: cargo-ratchet-x86_64-linux
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            binary: cargo-ratchet
            asset: cargo-ratchet-x86_64-linux-musl
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: cargo-ratchet
            asset: cargo-ratchet-aarch64-linux
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: cargo-ratchet
            asset: cargo-ratchet-x86_64-macos
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: cargo-ratchet
            asset: cargo-ratchet-aarch64-macos
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: cargo-ratchet.exe
            asset: cargo-ratchet-x86_64-windows.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Prepare asset (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.asset }}

      - name: Prepare asset (Windows)
        if: runner.os == 'Windows'
        run: Copy-Item target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Read version from Cargo.toml
        id: version
        run: echo "tag=v$(grep -m1 '^version = ' Cargo.toml | cut -d '"' -f2)" >> "$GITHUB_OUTPUT"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.version.outputs.tag }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$tag"
          else
            gh release create "$tag" --title "$tag" --generate-notes
          fi
          gh release upload "$tag" artifacts/*/* --clobber

  pages:
    name: Pages
    runs-on: ubuntu-latest
    needs: [build]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare site content
        run: |
          rm -rf _site
          mkdir -p _site/releases
          cp -R docs/. _site/
          cp artifacts/*/* _site/releases/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
